{{ $root := . }}
<header class="site-header">
    <div class="container">
        <nav class="nav" aria-label="Primary navigation">
            <a class="nav__brand" href="{{ $root.Site.BaseURL }}">
                {{ with $root.Site.Params.navLogo }}
                <img src="{{ . | absURL }}" alt="{{ $root.Site.Title }} logo" />
                {{ end }}
                <span
                    >{{ $root.Site.Params.tagline | default $root.Site.Title
                    }}</span
                >
            </a>

            <button
                class="nav__toggle"
                type="button"
                aria-label="Toggle navigation"
                aria-expanded="false"
            >
                <span class="nav__toggle-line"></span>
            </button>

            <ul class="nav__list">
                <li class="nav__item">
                    <a
                        href="{{ .Site.BaseURL }}"
                        class="nav__link{{ if .IsHome }} nav__link--active{{ end }}"
                        >{{ .Site.Params.home }}</a
                    >
                </li>
                {{ range .Site.Menus.nav }} {{ $active := or
                ($root.IsMenuCurrent "nav" .) ($root.HasMenuCurrent "nav" .) }}
                <li class="nav__item">
                    <a
                        href="{{ .URL | absURL }}"
                        class="nav__link{{ if $active }} nav__link--active{{ end }}"
                        title="{{ .Name }}"
                        >{{ .Name }}</a
                    >
                </li>
                {{ end }}
                <li class="nav__item nav__item--action">
                    <button
                        class="nav__theme-toggle"
                        type="button"
                        data-theme-toggle
                        aria-pressed="false"
                    >
                        <span class="nav__theme-toggle-icon" aria-hidden="true"
                            >🌙</span
                        >
                        <span class="nav__theme-toggle-label">Dark</span>
                    </button>
                </li>
                <li class="nav__item nav__item--action">
                    <div class="nav__font-picker">
                        <label for="font-picker" class="nav__font-picker-label">Font:</label>
                        <select
                            id="font-picker"
                            class="nav__font-picker-select"
                            data-font-picker
                            aria-label="Select font"
                        >
                            <option value="default">Default</option>
                            <option value="opendyslexic">OpenDyslexic</option>
                            <option value="arial">Arial</option>
                            <option value="verdana">Verdana</option>
                            <option value="georgia">Georgia</option>
                            <option value="comic-sans">Comic Sans</option>
                        </select>
                    </div>
                </li>
            </ul>
        </nav>
    </div>
</header>
